appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

save 900 1
save 300 10
save 60  10000

# Compact encoding for small hashes — keeps per-prefix memory low.
hash-max-listpack-entries 128
hash-max-listpack-value   64

lua-time-limit 1500

maxmemory 4096mb
maxmemory-policy allkeys-lru

requirepass ${REDIS_PASSWORD}

bind 0.0.0.0
protected-mode no
