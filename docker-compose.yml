name: rolando

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data:/home/appuser/data
    environment:
      - DATABASE_PATH=/home/appuser/data/${COMPOSE_PROJECT_NAME}.db
      - SERVER_ADDRESS=0.0.0.0:8080
    networks:
      - default
    restart: unless-stopped

  frontend:
    profiles:
      - prod
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - default
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./redis/redis_markov.lua:/scripts/redis_markov.lua:ro
      - ./redis/docker-entrypoint-redis.sh:/docker-entrypoint-redis.sh:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint-redis.sh"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

volumes:
  data:
