name: rolando

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./data:/home/appuser/data
    environment:
      - DATABASE_PATH=/home/appuser/data/${COMPOSE_PROJECT_NAME}.db
      - SERVER_ADDRESS=0.0.0.0:8080
      - CACHE_URL=valkey://:${CACHE_PASSWORD}@cache:6379
    networks:
      - default
    restart: unless-stopped
    depends_on:
      cache:
        condition: service_healthy

  frontend:
    profiles:
      - prod
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - default
    restart: unless-stopped

  cache:
    image: valkey/valkey:9.0.4-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CACHE_PORT:-6379}:6379"
    volumes:
      - ./data/cache:/data
      - ./cache/cache.conf:/usr/local/etc/cache/cache.conf:ro
      - ./cache/cache_markov.lua:/scripts/cache_markov.lua:ro
      - ./cache/docker-entrypoint-cache.sh:/docker-entrypoint-cache.sh:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint-cache.sh"]
    environment:
      - CACHE_PASSWORD=${CACHE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a \"$${CACHE_PASSWORD}\" ping >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

volumes:
  data:
