# Persist state across restarts with AOF (Append-Only File).
# This ensures trained Markov data survives container restarts.
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Optional: save a periodic RDB snapshot as a secondary safety net.
save 900 1
save 300 10
save 60  10000

# Allow the Lua function library to run WRITE commands (needed by
# train_markov, delete_markov, count_message, find_prefix).
# This is the default in Redis 7, stated explicitly for clarity.
# no-allow-reads-when-loading no

# Bind to all interfaces inside the compose network.
# Remove / restrict this in production.
bind 0.0.0.0

# Disable protected-mode so the init container can reach Redis without auth.
# Add `requirepass <password>` and update the redis-init entrypoint if you
# want password authentication.
protected-mode no
